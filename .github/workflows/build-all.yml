name: Build Multi-Platform Installers

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            script: .\package.bat x64
            artifact_path: SqlForge/dist/*.exe
          - os: macos-latest
            arch: arm64
            script: ./package.sh mac arm64
            artifact_path: SqlForge/dist/*.dmg
          - os: ubuntu-latest
            arch: x64
            script: ./package.sh linux x64
            artifact_path: SqlForge/dist/*.AppImage

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r SqlForge-Backend/requirements.txt
        pip install pyinstaller

    - name: Set up Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: SqlForge/package-lock.json

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libarchive-tools librsvg2-bin imagemagick

    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install librsvg imagemagick

    - name: Run Build Script (Windows)
      if: runner.os == 'Windows'
      run: ${{ matrix.script }}
      shell: cmd

    - name: Run Build Script (macOS/Linux)
      if: runner.os != 'Windows'
      run: ${{ matrix.script }}
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: SqlForge-${{ matrix.os }}-${{ matrix.arch }}
        path: ${{ matrix.artifact_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
