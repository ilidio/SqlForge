name: Build Multi-Platform Installers

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            script: .\package.bat x64
            artifact_path: SqlForge/dist/SqlForge*.exe
          - os: macos-latest
            arch: arm64
            script: ./package.sh mac arm64
            artifact_path: SqlForge/dist/*.dmg
          - os: ubuntu-latest
            arch: x64
            script: ./package.sh linux x64
            artifact_path: SqlForge/dist/*.AppImage

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r SqlForge-Backend/requirements.txt
        pip install pyinstaller

    - name: Set up Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: SqlForge/package-lock.json

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libarchive-tools librsvg2-bin imagemagick

    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install librsvg imagemagick

    - name: Run Build Script (Windows)
      if: runner.os == 'Windows'
      run: ${{ matrix.script }}
      shell: cmd

    - name: List dist content (Windows)
      if: runner.os == 'Windows'
      run: dir SqlForge\dist /s
      shell: cmd

    - name: Run Build Script (macOS/Linux)
      if: runner.os != 'Windows'
      run: ${{ matrix.script }}
      shell: bash

    - name: List dist content
      run: ls -R SqlForge/dist
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: SqlForge-${{ matrix.os }}-${{ matrix.arch }}
        path: ${{ matrix.artifact_path }}
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from package.json
        id: pkg_version
        run: echo "version=$(jq -r .version SqlForge/package.json)" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.pkg_version.outputs.version) }}
          files: artifacts/*
          generate_release_notes: true
          make_latest: true
