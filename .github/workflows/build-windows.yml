name: Build Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r SqlForge-Backend/requirements.txt
        # Ensure pyinstaller is installed if it's not in requirements.txt (it is, but good to be sure)
        pip install pyinstaller

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: SqlForge/package-lock.json

    - name: Run Build Script
      run: |
        .\package.bat x64
      shell: cmd

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SqlForge-Windows-Installer
        path: SqlForge/dist/*.exe
